<!DOCTYPE html>
<!-- saved from url=(0049)file:///C:/Users/user/Downloads/BNI-CRM-v3_2.html -->
<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BNI CRM · 토마호크</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0d14;min-height:100vh;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:#fff;padding-bottom:72px}

.header{background:rgba(10,13,20,.96);backdrop-filter:blur(12px);padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#00C9A7,#4A9EFF);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.app-title{font-weight:700;font-size:16px}
.app-sub{color:#555;font-size:10px}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,13,20,.97);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.07);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:10px 4px 8px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:#555;font-family:inherit;transition:color .2s}
.nav-btn.active{color:#00C9A7}
.nav-icon{font-size:20px}
.nav-label{font-size:10px;font-weight:600}

.container{max-width:600px;margin:0 auto;padding:16px}

.sec-title{font-size:11px;font-weight:700;color:#555;letter-spacing:.8px;margin-bottom:10px}

.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:14px 16px;margin-bottom:10px}

.btn{padding:13px 18px;border:none;border-radius:12px;font-family:inherit;font-weight:700;cursor:pointer;font-size:14px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,#00C9A7,#4A9EFF);color:#fff;width:100%}
.btn-primary:disabled{background:rgba(255,255,255,.07);color:#444;cursor:not-allowed}
.btn-ghost{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#aaa}
.btn-danger{background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.2);color:#ff5050;font-size:12px;padding:7px 14px}

.form-label{color:#666;font-size:11px;font-weight:600;margin-bottom:6px;display:block}
.form-input{width:100%;padding:12px 14px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.09);border-radius:10px;color:#ddd;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.form-input:focus{border-color:#00C9A7}
.form-input::placeholder{color:#444}
textarea.form-input{resize:vertical;line-height:1.6}
.form-group{margin-bottom:13px}

.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.type-btn{padding:11px 12px;border:1.5px solid rgba(255,255,255,.08);border-radius:11px;background:rgba(255,255,255,.04);cursor:pointer;font-family:inherit;text-align:left;transition:all .2s;color:#666;display:flex;align-items:center;gap:8px}
.type-btn.sel{border-color:var(--c);background:color-mix(in srgb,var(--c) 12%,transparent);color:var(--c)}

.divider{height:1px;background:rgba(255,255,255,.06);margin:13px 0}

.info-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.info-box{background:rgba(255,255,255,.04);border-radius:9px;padding:9px 11px}
.info-box.full{grid-column:1/-1}
.info-label{color:#555;font-size:10px;font-weight:600;margin-bottom:3px}
.info-value{color:#ddd;font-size:13px;font-weight:500;line-height:1.4}

.list-item{color:#bbb;font-size:13px;padding:4px 0 4px 12px;border-left:2px solid rgba(255,255,255,.1);margin-bottom:5px;line-height:1.5}

.match-card{background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.2);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.match-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:6px}
.match-name{font-size:15px;font-weight:700;color:#fff}
.match-reason{color:#999;font-size:12px;margin-top:4px;line-height:1.5}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-box{background:rgba(255,255,255,.04);border-radius:12px;padding:14px;text-align:center}
.stat-num{font-size:26px;font-weight:800;color:#00C9A7}
.stat-label{font-size:11px;color:#555;margin-top:3px}

.collapse-header{display:flex;justify-content:space-between;align-items:flex-start;cursor:pointer;user-select:none}
.collapse-arrow{color:#555;font-size:12px;margin-left:10px;flex-shrink:0;margin-top:2px}

.spinner{width:40px;height:40px;border:3px solid rgba(0,201,167,.15);border-top-color:#00C9A7;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

.error-box{background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.2);border-radius:10px;padding:12px;color:#ff6b6b;font-size:13px;margin-top:12px;line-height:1.5}

.empty{text-align:center;padding:60px 20px;color:#444}
.empty-icon{font-size:44px;margin-bottom:14px}
.empty-text{font-size:15px;color:#555;margin-bottom:6px}
.empty-sub{font-size:12px;line-height:1.7}

.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%) translateY(10px);background:#00C9A7;color:#000;padding:11px 22px;border-radius:30px;font-weight:700;font-size:13px;opacity:0;transition:all .3s;z-index:100;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.hint-box{background:rgba(0,201,167,.07);border:1px solid rgba(0,201,167,.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;color:#00C9A7;font-size:12px;line-height:1.6}

.filter-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;font-size:12px;transition:all .2s}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🔥</div>
  <div>
    <div class="app-title">BNI CRM · 토마호크</div>
    <div class="app-sub">송승훈 · 스마트 레퍼럴 관리</div>
  </div>
</div>

<div class="container" id="app">
  <div class="stat-grid">
    <div class="stat-box"><div class="stat-num">0</div><div class="stat-label">멤버</div></div>
    <div class="stat-box"><div class="stat-num">0</div><div class="stat-label">121 기록</div></div>
    <div class="stat-box"><div class="stat-num">0</div><div class="stat-label">회의/기타</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px">
    <button class="btn btn-primary" onclick="setTab(&#39;analyze&#39;)" style="font-size:13px">🤝 새 분석</button>
    <button class="btn btn-ghost" onclick="setTab(&#39;members&#39;)" style="font-size:13px">👥 멤버 관리</button>
  </div>
  <div class="empty"><div class="empty-icon">🚀</div><div class="empty-text">시작해볼까요?</div><div class="empty-sub">멤버를 먼저 등록하고<br>121 분석을 시작해 보세요</div></div></div>
<nav class="bottom-nav" id="nav"><button class="nav-btn active" onclick="setTab(&#39;home&#39;)"><span class="nav-icon">🏠</span><span class="nav-label">홈</span></button><button class="nav-btn " onclick="setTab(&#39;members&#39;)"><span class="nav-icon">👥</span><span class="nav-label">멤버</span></button><button class="nav-btn " onclick="setTab(&#39;analyze&#39;)"><span class="nav-icon">🤝</span><span class="nav-label">분석</span></button><button class="nav-btn " onclick="setTab(&#39;records&#39;)"><span class="nav-icon">📋</span><span class="nav-label">기록</span></button></nav>
<div class="toast" id="toast"></div>

<script>
// ── STATE ──
const S = {
  tab:'home', recordFilter:'전체',
  members: JSON.parse(localStorage.getItem('bni-members')||'[]'),
  records: JSON.parse(localStorage.getItem('bni-records')||'[]'),
  loading:false, error:'', expanded:{},
  analysisText:'', analysisType:'121',
  showMemberForm:false,
  mf:{name:'',business:'',detail:'',target:'',want:'',give:'',power:'',memo:''}
};

// ── UTILS ──
function save(){localStorage.setItem('bni-members',JSON.stringify(S.members));localStorage.setItem('bni-records',JSON.stringify(S.records))}
function fmt(d){return new Intl.DateTimeFormat('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).format(d)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function toggle(k){S.expanded[k]=!S.expanded[k];render()}
function setTab(id){S.tab=id;S.error='';render();window.scrollTo(0,0)}

// ── ANALYSIS TYPES ──
const AT = {
  '121':{label:'BNI 121',icon:'🤝',color:'#00C9A7',
    prompt:`BNI 네트워킹 전문가입니다. 대화를 분석해 순수 JSON만 출력하세요.
{"상대방":"이름","업종":"업종","세부분야":"세부분야","타겟고객":"타겟 고객층","비즈니스대화":["핵심1","핵심2","핵심3"],"사적대화":["개인적내용1","내용2"],"원하는레퍼럴":"원하는 것","줄수있는레퍼럴":"줄 수 있는 것","사업포인트":["강점1","강점2"],"팔로업":"다음 액션","팔로업날짜":"날짜 또는 2주 후","개인메모":"기억할 개인정보"}`
  },
  '회의':{label:'회의',icon:'👥',color:'#4A9EFF',
    prompt:`회의록 분석가입니다. 순수 JSON만 출력하세요.
{"회의명":"제목","참석자":["이름1","이름2"],"핵심내용":["내용1","내용2","내용3"],"결의사항":["결의1","결의2"],"방향성":"회의 방향성","액션아이템":["할일1","할일2"],"다음회의":"일정 또는 미정","메모":"기타"}`
  },
  '헬스링크':{label:'헬스링크',icon:'🏥',color:'#A78BFA',
    prompt:`TM헬스링크 상담 분석가입니다. 순수 JSON만 출력하세요.
{"상대방":"이름","상담유형":"설문/미팅/전화","주요증상":["증상1","증상2"],"관심제품":["제품1"],"고객반응":"긍정/중립/부정","니즈":"핵심 니즈","제안내용":"제안한 것","팔로업":"다음 액션","팔로업날짜":"날짜 또는 1주 후","메모":"기타"}`
  },
  '기타':{label:'기타미팅',icon:'💼',color:'#FF6B6B',
    prompt:`비즈니스 미팅 분석가입니다. 순수 JSON만 출력하세요.
{"상대방":"이름","업종":"업종","목적":"미팅 목적","핵심내용":["내용1","내용2","내용3"],"결과":"결과","팔로업":"다음 액션","팔로업날짜":"날짜 또는 미정","메모":"기타"}`
  }
};

// ── NAV ──
const TABS=[{id:'home',icon:'🏠',label:'홈'},{id:'members',icon:'👥',label:'멤버'},{id:'analyze',icon:'🤝',label:'분석'},{id:'records',icon:'📋',label:'기록'}];
function renderNav(){document.getElementById('nav').innerHTML=TABS.map(t=>`<button class="nav-btn ${S.tab===t.id?'active':''}" onclick="setTab('${t.id}')"><span class="nav-icon">${t.icon}</span><span class="nav-label">${t.label}</span></button>`).join('')}

// ── HOME ──
function renderHome(){
  const r121=S.records.filter(r=>r.type==='121').length;
  const rOther=S.records.length-r121;
  const recent=S.records.slice(0,3);
  return `
  <div class="stat-grid">
    <div class="stat-box"><div class="stat-num">${S.members.length}</div><div class="stat-label">멤버</div></div>
    <div class="stat-box"><div class="stat-num">${r121}</div><div class="stat-label">121 기록</div></div>
    <div class="stat-box"><div class="stat-num">${rOther}</div><div class="stat-label">회의/기타</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px">
    <button class="btn btn-primary" onclick="setTab('analyze')" style="font-size:13px">🤝 새 분석</button>
    <button class="btn btn-ghost" onclick="setTab('members')" style="font-size:13px">👥 멤버 관리</button>
  </div>
  ${recent.length?`
  <div class="sec-title">최근 기록</div>
  ${recent.map(r=>{const t=AT[r.type];const d=r.parsed;const name=d['상대방']||d['회의명']||(d['참석자']||[])[0]||'-';return`<div class="card" style="border-left:3px solid ${t.color};cursor:pointer" onclick="setTab('records')"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:600;font-size:14px">${t.icon} ${esc(name)}</div><div style="color:#555;font-size:11px;margin-top:3px">${r.date}</div></div><span style="background:${t.color}18;color:${t.color};font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600">${t.label}</span></div></div>`}).join('')}
  <button class="btn btn-ghost" onclick="setTab('records')" style="font-size:13px;margin-top:4px">전체 보기 →</button>
  `:`<div class="empty"><div class="empty-icon">🚀</div><div class="empty-text">시작해볼까요?</div><div class="empty-sub">멤버를 먼저 등록하고<br>121 분석을 시작해 보세요</div></div>`}`;
}

// ── MEMBERS ──
function renderMembers(){
  const f=S.mf;
  return `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div class="sec-title" style="margin:0">BNI 멤버 (${S.members.length}명)</div>
    <button class="btn btn-ghost" style="font-size:12px;padding:8px 14px" onclick="S.showMemberForm=!S.showMemberForm;render()">${S.showMemberForm?'✕ 닫기':'+ 멤버 추가'}</button>
  </div>
  ${S.showMemberForm?`
  <div class="card" style="border:1px solid rgba(0,201,167,.3);margin-bottom:16px">
    <div style="font-weight:700;font-size:14px;margin-bottom:14px;color:#00C9A7">👤 새 멤버 등록</div>
    <div class="form-group"><label class="form-label">이름 *</label><input class="form-input" placeholder="홍길동 대표님" value="${esc(f.name)}" oninput="S.mf.name=this.value"></div>
    <div class="form-group"><label class="form-label">업종 *</label><input class="form-input" placeholder="세무사 / 인테리어 / 보험 등" value="${esc(f.business)}" oninput="S.mf.business=this.value"></div>
    <div class="form-group"><label class="form-label">세부 분야</label><input class="form-input" placeholder="기장 위주 / 인보험 / 상업인테리어 등" value="${esc(f.detail)}" oninput="S.mf.detail=this.value"></div>
    <div class="form-group"><label class="form-label">타겟 고객층 *</label><input class="form-input" placeholder="자영업자, 소상공인, 창업 준비자 등" value="${esc(f.target)}" oninput="S.mf.target=this.value"></div>
    <div class="form-group"><label class="form-label">🎯 원하는 레퍼럴</label><input class="form-input" placeholder="법인 전환 원하는 자영업자 등" value="${esc(f.want)}" oninput="S.mf.want=this.value"></div>
    <div class="form-group"><label class="form-label">🎁 줄 수 있는 레퍼럴</label><input class="form-input" placeholder="세금 관련 도움이 필요한 모든 분야" value="${esc(f.give)}" oninput="S.mf.give=this.value"></div>
    <div class="form-group"><label class="form-label">⚡ 파워팀 가능 업종</label><input class="form-input" placeholder="노무사, 법무사, 컨설턴트 등" value="${esc(f.power)}" oninput="S.mf.power=this.value"></div>
    <div class="form-group"><label class="form-label">메모</label><textarea class="form-input" style="min-height:70px" placeholder="기억할 것들..." oninput="S.mf.memo=this.value">${esc(f.memo)}</textarea></div>
    <button class="btn btn-primary" onclick="addMember()">저장</button>
  </div>`:''
  }
  ${S.members.length===0?`<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">등록된 멤버가 없어요</div><div class="empty-sub">BNI 챕터 멤버를 등록하면<br>자동으로 레퍼럴·파워팀 매칭이 돼요</div></div>`:
  S.members.map((m,i)=>{
    const exp=S.expanded['m'+i];
    return `<div class="card" style="border-left:3px solid #00C9A7">
      <div class="collapse-header" onclick="toggle('m${i}')">
        <div><div style="font-weight:700;font-size:15px">${esc(m.name)}</div><div style="color:#888;font-size:12px;margin-top:2px">${esc(m.business)}${m.detail?' · '+esc(m.detail):''}</div></div>
        <span class="collapse-arrow">${exp?'▲':'▼'}</span>
      </div>
      ${exp?`<div class="divider"></div>
      <div class="info-row">
        ${m.target?`<div class="info-box full"><div class="info-label">타겟 고객</div><div class="info-value">${esc(m.target)}</div></div>`:''}
        ${m.want?`<div class="info-box full"><div class="info-label">🎯 원하는 레퍼럴</div><div class="info-value">${esc(m.want)}</div></div>`:''}
        ${m.give?`<div class="info-box full"><div class="info-label">🎁 줄 수 있는 레퍼럴</div><div class="info-value">${esc(m.give)}</div></div>`:''}
        ${m.power?`<div class="info-box full"><div class="info-label">⚡ 파워팀 가능</div><div class="info-value">${esc(m.power)}</div></div>`:''}
        ${m.memo?`<div class="info-box full"><div class="info-label">📝 메모</div><div class="info-value">${esc(m.memo)}</div></div>`:''}
      </div>
      <button class="btn btn-danger" style="margin-top:10px" onclick="delMember(${i})">🗑️ 삭제</button>`:''}
    </div>`;
  }).join('')}`;
}

function addMember(){
  const f=S.mf;
  if(!f.name.trim()||!f.business.trim()){alert('이름과 업종은 필수예요!');return}
  S.members.push({...f,id:Date.now()});
  S.mf={name:'',business:'',detail:'',target:'',want:'',give:'',power:'',memo:''};
  S.showMemberForm=false;
  save();toast('✅ 멤버 등록 완료!');render();
}
function delMember(i){if(!confirm('삭제할까요?'))return;S.members.splice(i,1);save();render()}

// ── ANALYZE ──
function renderAnalyze(){
  const can=S.analysisText.length>30&&!S.loading;
  return `
  <div class="sec-title">STEP 1 · 유형 선택</div>
  <div class="type-grid">
    ${Object.entries(AT).map(([k,v])=>`<button class="type-btn ${S.analysisType===k?'sel':''}" style="--c:${v.color}" onclick="S.analysisType='${k}';render()"><span style="font-size:16px">${v.icon}</span><span style="font-size:13px;font-weight:600;color:${S.analysisType===k?v.color:'#666'}">${v.label}</span></button>`).join('')}
  </div>
  <div class="sec-title">STEP 2 · 클로바노트 텍스트 붙여넣기</div>
  <div class="hint-box">💡 클로바노트 앱 → 녹음 완료 → 전체 텍스트 복사 → 아래 붙여넣기</div>
  <textarea class="form-input" style="min-height:200px;margin-bottom:8px"
    placeholder="클로바노트에서 복사한 텍스트를 붙여넣으세요...

예시)
송승훈: 안녕하세요 대표님, 오늘 121 감사합니다.
홍길동: 네 저도요. 요즘 사업은 어떠세요?
..."
    oninput="S.analysisText=this.value;document.getElementById('cc').textContent=this.value.length>0?this.value.length+'자':'최소 30자 이상'"
  >${esc(S.analysisText)}</textarea>
  <div id="cc" style="text-align:right;color:#444;font-size:11px;margin-bottom:14px">${S.analysisText.length>0?S.analysisText.length+'자':'최소 30자 이상'}</div>
  ${S.loading?`<div style="text-align:center;padding:30px 0"><div class="spinner"></div><div style="color:#00C9A7;font-weight:700">Claude AI 분석 중...</div><div style="color:#555;font-size:12px;margin-top:6px">${S.members.length>0&&S.analysisType==='121'?'분석 + 멤버 매칭 진행 중...':'잠시만 기다려 주세요'}</div></div>`:`<button class="btn btn-primary" ${can?'':'disabled'} onclick="doAnalysis()">🤖 AI 분석 시작</button>`}
  ${S.error?`<div class="error-box">⚠️ ${esc(S.error)}</div>`:''}`;
}

async function doAnalysis(){
  if(S.analysisText.length<30||S.loading)return;
  S.loading=true;S.error='';render();
  try{
    const type=AT[S.analysisType];
    const r1=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:type.prompt,messages:[{role:'user',content:`다음 대화를 분석해주세요:\n\n${S.analysisText}`}]})});
    const d1=await r1.json();
    if(d1.error)throw new Error(d1.error.message);
    const raw1=(d1.content||[]).map(b=>b.text||'').join('');
    const parsed=JSON.parse(raw1.replace(/```json|```/g,'').trim());

    let matches=[];
    if(S.members.length>0&&S.analysisType==='121'){
      const r2=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,system:`BNI 레퍼럴 매칭 전문가입니다. 순수 JSON 배열만 출력하세요. 매칭 없으면 [].
[{"name":"멤버이름","type":"레퍼럴 또는 파워팀","reason":"구체적인 매칭 이유 한 줄"}]`,messages:[{role:'user',content:`분석된 사람:\n${JSON.stringify(parsed)}\n\nBNI 멤버:\n${JSON.stringify(S.members.map(m=>({name:m.name,business:m.business,target:m.target,want:m.want,give:m.give,power:m.power})))}\n\n레퍼럴 매칭(원하는 레퍼럴 충족)과 파워팀 매칭(같은 고객층 협업)을 찾아주세요.`}]})}); 
      const d2=await r2.json();
      const raw2=(d2.content||[]).map(b=>b.text||'').join('');
      try{matches=JSON.parse(raw2.replace(/```json|```/g,'').trim())}catch(e){matches=[]}
    }

    const rec={id:Date.now(),type:S.analysisType,date:fmt(new Date()),transcript:S.analysisText,parsed,matches};
    S.records.unshift(rec);
    save();
    S.loading=false;S.analysisText='';
    S.expanded['r'+rec.id]=true;
    S.tab='records';
    render();
    toast(matches.length>0?`✅ 분석 완료! 매칭 ${matches.length}건 발견!`:'✅ 분석 완료! 저장됐어요');
  }catch(e){
    S.loading=false;S.error='분석 중 오류가 발생했어요. 다시 시도해 주세요.';render();
  }
}

// ── RECORDS ──
function renderRecords(){
  const types=['전체',...Object.keys(AT)];
  const f=S.recordFilter||'전체';
  const list=f==='전체'?S.records:S.records.filter(r=>r.type===f);
  return `
  <div class="filter-row">
    ${types.map(t=>{const cnt=t==='전체'?S.records.length:S.records.filter(r=>r.type===t).length;const active=f===t;return`<button class="filter-chip" onclick="S.recordFilter='${t}';render()" style="background:${active?'#00C9A7':'rgba(255,255,255,.06)'};color:${active?'#000':'#888'};font-weight:${active?700:400}">${t} ${cnt}</button>`}).join('')}
  </div>
  ${list.length===0?`<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">기록이 없어요</div><div class="empty-sub">분석 탭에서 시작해 보세요</div></div>`:
  list.map(r=>renderCard(r)).join('')}`;
}

function renderCard(r){
  const type=AT[r.type];const d=r.parsed;const exp=S.expanded['r'+r.id];
  const name=d['상대방']||d['회의명']||(d['참석자']||[])[0]||'-';
  let body='';
  if(exp){
    // 매칭 결과
    if(r.matches?.length){
      body+=`<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:#FFD700;margin-bottom:8px">⚡ 레퍼럴·파워팀 매칭</div>
      ${r.matches.map(m=>`<div class="match-card"><span class="match-badge" style="background:${m.type==='레퍼럴'?'rgba(0,201,167,.2)':'rgba(255,215,0,.15)'};color:${m.type==='레퍼럴'?'#00C9A7':'#FFD700'}">${m.type==='레퍼럴'?'🤝 레퍼럴':'⚡ 파워팀'}</span><div class="match-name">${esc(m.name)}</div><div class="match-reason">${esc(m.reason)}</div></div>`).join('')}
      <div class="divider"></div></div>`;
    }
    // 121
    if(r.type==='121'){
      if(d['비즈니스대화']?.length){body+=`<div style="font-size:11px;font-weight:700;color:#00C9A7;margin-bottom:7px">💼 비즈니스 대화</div>`;body+=d['비즈니스대화'].map(v=>`<div class="list-item">• ${esc(v)}</div>`).join('')}
      if(d['사적대화']?.length){body+=`<div style="font-size:11px;font-weight:700;color:#888;margin:12px 0 7px">☕ 사적 대화</div>`;body+=d['사적대화'].map(v=>`<div class="list-item">• ${esc(v)}</div>`).join('')}
      if(d['사업포인트']?.length){body+=`<div style="font-size:11px;font-weight:700;color:#4A9EFF;margin:12px 0 7px">💡 사업 포인트</div>`;body+=d['사업포인트'].map(v=>`<div class="list-item">• ${esc(v)}</div>`).join('')}
      body+=`<div class="info-row">
        <div class="info-box"><div class="info-label">업종</div><div class="info-value">${esc(d['업종']||'-')}</div></div>
        <div class="info-box"><div class="info-label">타겟 고객</div><div class="info-value">${esc(d['타겟고객']||'-')}</div></div>
        <div class="info-box full"><div class="info-label">🎯 원하는 레퍼럴</div><div class="info-value">${esc(d['원하는레퍼럴']||'-')}</div></div>
        <div class="info-box full"><div class="info-label">🎁 줄 수 있는 레퍼럴</div><div class="info-value">${esc(d['줄수있는레퍼럴']||'-')}</div></div>
        <div class="info-box"><div class="info-label">📅 팔로업 날짜</div><div class="info-value">${esc(d['팔로업날짜']||'-')}</div></div>
        <div class="info-box"><div class="info-label">📌 다음 액션</div><div class="info-value">${esc(d['팔로업']||'-')}</div></div>
        ${d['개인메모']&&d['개인메모']!=='없음'?`<div class="info-box full" style="border:1px solid rgba(255,215,0,.2)"><div class="info-label">🧠 개인 메모</div><div class="info-value">${esc(d['개인메모'])}</div></div>`:''}
      </div>`;
    }
    // 회의
    else if(r.type==='회의'){
      if(d['핵심내용']?.length){body+=`<div style="font-size:11px;font-weight:700;color:#4A9EFF;margin-bottom:7px">💬 핵심 내용</div>`;body+=d['핵심내용'].map(v=>`<div class="list-item">• ${esc(v)}</div>`).join('')}
      if(d['결의사항']?.length){body+=`<div style="font-size:11px;font-weight:700;color:#4A9EFF;margin:12px 0 7px">✅ 결의사항</div>`;body+=d['결의사항'].map(v=>`<div class="list-item">• ${esc(v)}</div>`).join('')}
      if(d['액션아이템']?.length){body+=`<div style="font-size:11px;font-weight:700;color:#4A9EFF;margin:12px 0 7px">📌 액션 아이템</div>`;body+=d['액션아이템'].map(v=>`<div class="list-item">• ${esc(v)}</div>`).join('')}
      body+=`<div class="info-row"><div class="info-box full"><div class="info-label">방향성</div><div class="info-value">${esc(d['방향성']||'-')}</div></div><div class="info-box full"><div class="info-label">다음 회의</div><div class="info-value">${esc(d['다음회의']||'-')}</div></div></div>`;
    }
    // 헬스링크
    else if(r.type==='헬스링크'){
      body+=`<div class="info-row"><div class="info-box"><div class="info-label">상담 유형</div><div class="info-value">${esc(d['상담유형']||'-')}</div></div><div class="info-box"><div class="info-label">고객 반응</div><div class="info-value">${esc(d['고객반응']||'-')}</div></div><div class="info-box full"><div class="info-label">핵심 니즈</div><div class="info-value">${esc(d['니즈']||'-')}</div></div></div>`;
      if(d['주요증상']?.length){body+=`<div style="font-size:11px;font-weight:700;color:#A78BFA;margin:12px 0 7px">🏥 주요 증상</div>`;body+=d['주요증상'].map(v=>`<div class="list-item">• ${esc(v)}</div>`).join('')}
      body+=`<div class="info-row"><div class="info-box full"><div class="info-label">제안 내용</div><div class="info-value">${esc(d['제안내용']||'-')}</div></div><div class="info-box"><div class="info-label">팔로업</div><div class="info-value">${esc(d['팔로업날짜']||'-')}</div></div><div class="info-box"><div class="info-label">액션</div><div class="info-value">${esc(d['팔로업']||'-')}</div></div></div>`;
    }
    // 기타
    else{
      if(d['핵심내용']?.length){body+=`<div style="font-size:11px;font-weight:700;color:#FF6B6B;margin-bottom:7px">💬 핵심 내용</div>`;body+=d['핵심내용'].map(v=>`<div class="list-item">• ${esc(v)}</div>`).join('')}
      body+=`<div class="info-row"><div class="info-box full"><div class="info-label">목적</div><div class="info-value">${esc(d['목적']||'-')}</div></div><div class="info-box full"><div class="info-label">결과</div><div class="info-value">${esc(d['결과']||'-')}</div></div><div class="info-box"><div class="info-label">팔로업</div><div class="info-value">${esc(d['팔로업날짜']||'-')}</div></div><div class="info-box"><div class="info-label">액션</div><div class="info-value">${esc(d['팔로업']||'-')}</div></div></div>`;
    }
    body+=`<div class="divider"></div><div style="color:#444;font-size:10px;font-weight:600;margin-bottom:6px">📝 원본 텍스트</div><div style="color:#444;font-size:12px;line-height:1.6;max-height:70px;overflow:auto;background:rgba(0,0,0,.2);padding:10px;border-radius:8px">${esc(r.transcript)}</div><button class="btn btn-danger" style="margin-top:12px" onclick="delRecord(${r.id})">🗑️ 삭제</button>`;
  }
  return`<div class="card" style="border-left:3px solid ${type.color}">
    <div class="collapse-header" onclick="toggle('r${r.id}')">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-weight:700;font-size:15px">${type.icon} ${esc(name)}</span>
          ${r.matches?.length?`<span style="background:rgba(255,215,0,.15);color:#FFD700;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700">⚡ 매칭 ${r.matches.length}건</span>`:''}
        </div>
        <div style="color:#555;font-size:11px;margin-top:3px">${r.date} · <span style="color:${type.color}">${type.label}</span></div>
      </div>
      <span class="collapse-arrow">${exp?'▲':'▼'}</span>
    </div>
    ${exp?`<div class="divider"></div>${body}`:''}
  </div>`;
}

function delRecord(id){if(!confirm('삭제할까요?'))return;S.records=S.records.filter(r=>r.id!==id);save();render()}

// ── MAIN ──
function render(){
  const map={home:renderHome,members:renderMembers,analyze:renderAnalyze,records:renderRecords};
  document.getElementById('app').innerHTML=(map[S.tab]||renderHome)();
  renderNav();
}
render();
</script>
